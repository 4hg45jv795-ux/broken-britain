<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Broken Britain</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06070b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Broken Britain">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
:root{--ink:#e8e4db;--muted:#8a8278;--line:#22252b;--panel:#14161a;--panel2:#1e2026;--accent:#c0392b;--gold:#c9a84c;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#0b0c0f;color:var(--ink);font-family:'Arial Narrow','Roboto Condensed',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
@supports(padding:max(0px)){
  #app{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right));
       padding-top:max(8px,env(safe-area-inset-top));padding-bottom:max(8px,env(safe-area-inset-bottom));}
}
#app{min-height:100%;display:flex;align-items:center;justify-content:center;padding:14px;
  background:
    linear-gradient(180deg,rgba(6,8,12,.55),rgba(6,8,12,.30) 38%,rgba(6,8,12,.80)),
    url('menu-bg.jpg') center/cover no-repeat fixed,
    radial-gradient(120% 75% at 50% 0%, #16223e 0%, #0a0e18 52%, #06070b 100%);}
.stage{width:100%;max-width:900px;}

/* ── SELECT ── */
#select{padding:8px 0 18px;text-align:center;}
.eyebrow{font:700 12px/1 monospace;letter-spacing:.34em;text-transform:uppercase;color:#9fb4d8;margin-bottom:8px;text-shadow:0 0 12px rgba(60,120,255,.45);}
.title{margin:.04em 0 .14em;line-height:.94;}
.title span{display:block;font-weight:900;letter-spacing:-.01em;text-transform:uppercase;line-height:.96;
  font-size:clamp(40px,15vw,98px);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  text-shadow:1px 1px 0 #15171c,2px 3px 0 rgba(0,0,0,.5),0 5px 10px rgba(0,0,0,.65);}
.word-broken{background-image:linear-gradient(100deg,#ffffff 0%,#dfe6f4 34%,#8294c2 60%,#22407e 100%);}
.word-britain{background-image:linear-gradient(100deg,#ff3b4d 0%,#cf142b 28%,#eef2ff 52%,#1f3f86 100%);}
.sub{color:#eef1f7;margin:8px 0 20px;font-size:clamp(15px,4.6vw,21px);font-weight:700;text-shadow:0 1px 5px #000;}
.warn{color:#ffb4a8;border:1px solid var(--accent);background:#2a1512;border-radius:10px;padding:10px 12px;margin:0 auto 16px;max-width:340px;font:600 12px/1.4 monospace;display:none;text-align:left;}
.warn b{color:#fff;}
.grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:flex-start;}
.card{position:relative;width:min(74vw,262px);border-radius:20px;padding:20px 16px 17px;cursor:pointer;
  background:linear-gradient(180deg,#0c1119,#06090f);
  transition:transform .15s ease,box-shadow .15s ease;
  box-shadow:0 0 22px rgba(40,140,255,.45),0 0 46px rgba(255,40,80,.22),inset 0 0 42px rgba(20,60,140,.20);}
.card::before{content:'';position:absolute;inset:-2px;border-radius:22px;z-index:-1;
  background:linear-gradient(135deg,#39d6ff 0%,#1f7bff 38%,#7a1730 60%,#ff2b4d 100%);}
.card::after{content:'';position:absolute;inset:0;border-radius:20px;pointer-events:none;
  background:radial-gradient(58% 40% at 50% 62%, rgba(60,130,255,.22), transparent 72%);}
.card:hover,.card:focus-visible{transform:translateY(-5px);outline:none;
  box-shadow:0 0 32px rgba(40,150,255,.75),0 0 62px rgba(255,40,80,.42),inset 0 0 48px rgba(20,60,140,.28);}
.thumb{position:relative;margin:0 auto 14px;display:flex;justify-content:center;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.7));}
.thumb canvas{display:block;}
.name{font-weight:900;letter-spacing:.06em;text-transform:uppercase;font-size:23px;color:#bfe4ff;
  text-shadow:0 0 14px rgba(50,160,255,.9),0 0 5px rgba(50,160,255,.7);margin-bottom:3px;}
.flagtag{font:700 12px/1 monospace;color:#9fb0cc;letter-spacing:.22em;}
.hint-text{text-align:center;color:#c8d1e1;font-size:13px;margin-top:16px;text-shadow:0 1px 4px #000;}
.crusader-soon{opacity:.45;cursor:default;}
.iconbtn{pointer-events:auto;background:#0008;border:1px solid #fff3;color:var(--ink);border-radius:9px;
  min-width:42px;padding:7px 10px;font:700 13px/1 sans-serif;cursor:pointer;letter-spacing:.04em;}
.iconbtn:active{background:#fff2;transform:scale(.96);}
#pausemenu{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000b;z-index:16;}
#pausemenu.on{display:flex;}
.pausecard{font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#fff;text-align:center;
  font-size:30px;text-shadow:0 2px 10px #000;}
.pausecard span{display:block;font:600 13px monospace;color:#cdd3df;margin-top:10px;letter-spacing:.06em;text-transform:none;}
#kbhint{display:block;width:max-content;max-width:90%;margin:18px auto 0;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:11px 18px;}

/* ── GAME ── */
.game{position:relative;display:none;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#0c0d10;touch-action:none;}
canvas#cv{display:block;width:100%;height:auto;}
.topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:linear-gradient(#000a,transparent);pointer-events:none;}
.who{font-weight:900;text-transform:uppercase;letter-spacing:.05em;font-size:13px;text-shadow:0 1px 2px #000;}
.who small{display:block;font:600 10px/1 monospace;color:#c0bdb5;letter-spacing:.18em;}
.change{pointer-events:auto;background:#0008;border:1px solid #fff3;color:var(--ink);border-radius:9px;padding:7px 11px;font:700 11px/1 sans-serif;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;}
.change:active{background:#fff2;}
.banner{position:absolute;left:50%;top:34%;transform:translateX(-50%);background:#000a;border:1px solid var(--accent);color:#fff;padding:10px 16px;border-radius:10px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;}
.controls{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#13151a;border-top:1px solid var(--line);}
.pad{display:flex;gap:12px;}
.btn{width:62px;height:62px;border-radius:50%;background:#0009;border:1.5px solid #ffffff30;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none;backdrop-filter:blur(2px);}
.btn:active{background:#ffffff33;transform:scale(.94);}
.btn.punch{width:70px;height:70px;font-size:13px;font-weight:900;letter-spacing:.04em;border-color:var(--accent);color:#ffd6cc;}
.btn.jump{width:70px;height:70px;font-size:13px;font-weight:900;letter-spacing:.04em;}

/* ── CUTSCENE ── */
#cutscene{position:absolute;inset:0;background:#000c;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:20;}
#cutscene.active{display:flex;}
.bubble{background:#fff;color:#111;border-radius:14px;padding:10px 16px;max-width:72%;font:700 13px/1.4 sans-serif;position:relative;margin:4px 0;}
.bubble.left{align-self:flex-start;margin-left:6%;}
.bubble.right{align-self:flex-end;margin-right:6%;background:#2255cc;color:#fff;}
.bubble.left::before{content:'';position:absolute;left:-10px;top:12px;border:6px solid transparent;border-right-color:#fff;}
.bubble.right::after{content:'';position:absolute;right:-10px;top:12px;border:6px solid transparent;border-left-color:#2255cc;}
.bubble-label{font:700 10px/1 monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:8px 4px 2px;align-self:flex-start;}
.bubble-label.right-label{align-self:flex-end;margin-right:6%;}
#cutscene-skip{position:absolute;bottom:12px;right:14px;color:#fff8;font:600 11px monospace;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:#0b0c0f;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:99;}
.load-bar-wrap{width:200px;height:4px;background:#222;border-radius:2px;margin-top:14px;}
.load-bar{height:4px;background:var(--accent);border-radius:2px;width:0%;transition:width .2s;}
.load-txt{font:700 12px monospace;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}

@media(max-height:520px){
  #app{align-items:flex-start;padding:4px 8px;}
  canvas#cv{height:50vh;width:auto;max-width:100%;margin:0 auto;}
  .btn{width:48px;height:48px;font-size:20px;}
  .btn.jump,.btn.punch{width:56px;height:56px;font-size:11px;}
  h1{font-size:26px;}.sub{margin-bottom:6px;}
  .controls{padding:6px 10px;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="load-txt">Loading&hellip;</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
</div>

<div id="app" style="display:none"><div class="stage">

<section id="select">
  <div class="eyebrow">Side-scroller</div>
  <div class="title"><span class="word-broken">Broken</span><span class="word-britain">Britain</span></div>
  <p class="sub">Pick your fighter.</p>
  <div class="warn" id="warn"></div>
  <div class="grid" id="cards"></div>
  <p class="hint-text">Tap a fighter to drop into the world.</p>
</section>

<section class="game" id="game">
  <canvas id="cv" width="800" height="360"></canvas>
  <div class="topbar">
    <div class="who" id="who">—<small id="flag"></small></div>
    <button class="iconbtn" id="pause" aria-label="Pause">&#10073;&#10073;</button>
  </div>
  <div class="banner" id="banner">St. Jude's Park — end of level</div>
  <div id="pausemenu"><div class="pausecard">Paused<span>Tap to resume</span></div></div>
  <div id="cutscene">
    <div id="cs-lines" style="width:90%;max-height:90%;display:flex;flex-direction:column;justify-content:center;gap:2px;overflow:hidden;"></div>
    <div id="cutscene-skip">Tap to continue &#9654;</div>
  </div>
  <div class="controls">
    <div class="pad">
      <div class="btn" data-k="left">&#9664;</div>
      <div class="btn" data-k="right">&#9654;</div>
    </div>
    <div class="pad">
      <div class="btn punch" data-k="punch">PUNCH</div>
      <div class="btn jump" data-k="jump">JUMP</div>
    </div>
  </div>
</section>

<p class="hint-text" id="kbhint">Keyboard: &larr; &rarr; walk &middot; Space/&uarr; jump &middot; X punch.</p>
</div></div>

<audio id="bgm" loop preload="none" src="music.mp3"></audio>

<script>
let FW=181,FH=218;          // current fighter's frame size (set in start())
const PFW=124,PFH=214;      // photographer frame size
// Per-fighter animation clips. fps = frames-per-second within a ~60fps loop;
// loop=false clamps on the last frame.
const CLIPS_BRIT={
  idle:   {start:0,  count:5, fps:7,  loop:true},
  walk:   {start:5,  count:6, fps:10, loop:true},
  run:    {start:11, count:6, fps:15, loop:true},
  jump:   {start:17, count:6, fps:12, loop:false},
  punch:  {start:23, count:6, fps:20, loop:false},
  headbutt:{start:29,count:4, fps:16, loop:false},
  die:    {start:33, count:3, fps:8,  loop:false},
};
const CLIPS_CRU={
  idle:   {start:0,  count:4, fps:5,  loop:true},
  walk:   {start:4,  count:8, fps:10, loop:true},
  run:    {start:12, count:8, fps:14, loop:true},
  jump:   {start:20, count:8, fps:12, loop:false},
  punch:  {start:28, count:8, fps:14, loop:false},  // overhead chop
  headbutt:{start:28,count:8, fps:14, loop:false},  // second tap replays the chop
  die:    {start:36, count:3, fps:8,  loop:false},
};
let CLIPS=CLIPS_BRIT;       // current fighter's clips (set in start())
const GSTEP=60;
const GROUNDPTS=[322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,322,330.0,342.0,346,346,346,346,346,346,346,346,346,346,346,346,346,346,338.0,330.0,322,322,322,322,322,322,322,322,322,322];
function groundAt(x){
  let i=x/GSTEP,a=Math.max(0,Math.min(GROUNDPTS.length-1,Math.floor(i))),b=Math.min(a+1,GROUNDPTS.length-1),t=i-a;
  return GROUNDPTS[a]*(1-t)+GROUNDPTS[b]*t;
}

// ── helper: is this image actually usable? ──
function imgOk(im){ return im && im.complete && im.naturalWidth>0; }

// ── Asset loading with progress ──
const ASSETS = [
  {key:'bg',   type:'img', src:'bg.jpg'},
  {key:'brit', type:'img', src:'brit2.png'},
  {key:'crusader', type:'img', src:'crusader.png'},
  {key:'photog', type:'img', src:'photog2.png'},
];

const loaded={};
const failed=[];          // <-- track assets that 404 / fail to decode
let loadedCount=0;
function onLoad(){
  loadedCount++;
  document.getElementById('load-bar').style.width=(loadedCount/ASSETS.length*100)+'%';
  if(loadedCount>=ASSETS.length) onAllLoaded();
}
ASSETS.forEach(a=>{
  const im=new Image();
  im.onload=onLoad;
  im.onerror=()=>{ failed.push(a.src); console.error('[BrokenBritain] failed to load:',a.src); onLoad(); };
  im.src=a.src;
  loaded[a.key]=im;
});
function onAllLoaded(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  if(failed.length){
    const w=document.getElementById('warn');
    w.style.display='block';
    w.innerHTML='<b>Missing files ('+failed.length+'):</b><br>'+failed.join('<br>')+
      '<br><br>These need to be deployed next to index.html. The game can\u2019t render without them.';
  }
  buildCards();
}

// ── META ──
const META=[
  {id:'brit',     name:'The Brawler',  flag:'GREAT BRITAIN', fw:181, fh:218, clips:CLIPS_BRIT},
  {id:'crusader', name:'The Crusader', flag:'CHRISTENDOM',    fw:134, fh:179, clips:CLIPS_CRU},
];

function buildCards(){
  const grid=document.getElementById('cards');
  META.forEach(m=>{
    const c=document.createElement('button'); c.className='card';
    const thumbDiv=document.createElement('div'); thumbDiv.className='thumb';
    const cv2=document.createElement('canvas');
    const TW=150, dh=Math.round(TW*m.fh/m.fw);
    cv2.width=TW; cv2.height=dh;
    const ctx2=cv2.getContext('2d');
    ctx2.imageSmoothingEnabled=true;
    // Guard the draw so a broken sprite can never kill the whole card list.
    if(imgOk(loaded[m.id])){
      try{ ctx2.drawImage(loaded[m.id],0,0,m.fw,m.fh,0,0,TW,dh); }
      catch(err){ drawThumbPlaceholder(ctx2,TW,dh); }
    }else{
      drawThumbPlaceholder(ctx2,TW,dh);
    }
    thumbDiv.appendChild(cv2); c.appendChild(thumbDiv);
    const nameDiv=document.createElement('div'); nameDiv.className='name'; nameDiv.textContent=m.name;
    const flagDiv=document.createElement('div'); flagDiv.className='flagtag'; flagDiv.textContent=m.flag;
    c.appendChild(nameDiv); c.appendChild(flagDiv);
    c.onclick=()=>start(m);
    grid.appendChild(c);
  });
}
function drawThumbPlaceholder(ctx2,w,h){
  ctx2.fillStyle='#16202f'; ctx2.fillRect(0,0,w,h);
  ctx2.strokeStyle='#2bd4ff'; ctx2.lineWidth=1.5; ctx2.strokeRect(2,2,w-4,h-4);
  ctx2.fillStyle='#2bd4ff'; ctx2.font='700 13px monospace'; ctx2.textAlign='center';
  ctx2.fillText('no img', w/2, h/2+4);
  ctx2.textAlign='start';
}

// ── GAME ──
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const VW=800,VH=360;
let BGW=4047;
// BGW default is 4047 — correct for our background
const ZOOM=1.5,SRCW=VW/ZOOM,SRCH=VH/ZOOM,SRCY=360-SRCH;
const PH=80; let PW=Math.round(PH*FW/FH);
let cur=null,raf=null;
const player={x:120,y:200,vx:0,vy:0,face:1,onGround:true,clip:'idle',ct:0};
const keys={left:false,right:false,jump:false};
let punchDown=false,punchEdge=false;
let runHold=0;
function setClip(name){ if(player.clip!==name){player.clip=name;player.ct=0;} }
function clipDone(){ const c=CLIPS[player.clip]; return !c.loop && player.ct>=Math.ceil(c.count*60/c.fps); }
function playerAttacking(){ return player.clip==='punch'||player.clip==='headbutt'; }
const SPEED=2.1,RUNSPEED=3.4,GRAV=0.55,JUMP=-9.6;
let bannerShown=false;

// ── CUTSCENE ──
const DIALOGUE=[
  {side:'left', label:'YOU',          text:'Who are you?'},
  {side:'right',label:'PHOTOGRAPHER', text:'Independence Media.'},
  {side:'left', label:'YOU',          text:'Well f#*k off home then.'},
  {side:'right',label:'PHOTOGRAPHER', text:"I'm just taking pictures. I won't get anybody's faces."},
  {side:'left', label:'YOU',          text:"Okay, f#*k it — tag along and take some pics of the mess I'm about to leave. Let's go."},
];
let csActive=false,csDone=false,csStep=0,csTimeout=null;
function startCutscene(){
  csActive=true; csStep=0;
  document.getElementById('cutscene').classList.add('active');
  document.getElementById('cs-lines').innerHTML='';
  showNextLine();
}
function showNextLine(){
  if(csStep>=DIALOGUE.length){endCutscene();return;}
  const d=DIALOGUE[csStep++];
  const lines=document.getElementById('cs-lines');
  const lbl=document.createElement('div');
  lbl.className='bubble-label'+(d.side==='right'?' right-label':'');
  lbl.textContent=d.label;
  const b=document.createElement('div');
  b.className='bubble '+d.side; b.textContent=d.text;
  b.style.cssText='opacity:0;transform:translateY(6px);transition:all .25s';
  lbl.style.cssText='opacity:0;transition:opacity .2s';
  lines.appendChild(lbl); lines.appendChild(b);
  // Only keep the two most recent messages (4 elements) so the newest bubble
  // is always fully visible, even on short landscape screens.
  while(lines.children.length>4){ lines.removeChild(lines.firstChild); }
  requestAnimationFrame(()=>requestAnimationFrame(()=>{b.style.opacity='1';b.style.transform='translateY(0)';lbl.style.opacity='1';}));
  csTimeout=setTimeout(showNextLine,2200);
}
function endCutscene(){
  csActive=false; csDone=true;
  document.getElementById('cutscene').classList.remove('active');
}
document.getElementById('cutscene').addEventListener('click',()=>{
  if(!csActive)return; clearTimeout(csTimeout);
  if(csStep<DIALOGUE.length) showNextLine(); else endCutscene();
});

// ── NPC ──
const NPCH=78,NPCW=Math.round(NPCH*PFW/PFH);
const npc={x:0,y:0,state:'walkin',t:0,anim:0,active:false};
function initNPC(){
  npc.x=player.x+SRCW+80; npc.state='walkin'; npc.t=0; npc.anim=0; npc.active=true;
  csDone=false; npc.y=groundAt(npc.x+NPCW/2)-NPCH;
}
function updateNPC(){
  if(!npc.active)return;
  if(csActive){npc.state='idle';npc.y=groundAt(npc.x+NPCW/2)-NPCH;return;}
  if(npc.state==='walkin'){
    npc.x-=1.4; npc.anim+=0.17;
    if(!csDone&&Math.abs(player.x-npc.x)<180){npc.state='idle';startCutscene();}
  }
  else if(npc.state==='idle'){
    // Cutscene done — hold position (facing the player) until he walks past.
    npc.t=0;
    if(player.x > npc.x + 20) npc.state='trail';
  }
  else{
    // Trail behind the player: he heads right, photographer stays on his left.
    const targetX=player.x-130;
    const gap=npc.x-targetX;
    if(gap>30){npc.x-=1.8;npc.anim+=0.16;npc.state='trail';}
    else if(gap<-20){npc.x+=2.3;npc.anim+=0.16;npc.state='trail';}
    else npc.state=playerAttacking()?'photo':'trailIdle';
    if(playerAttacking()&&npc.state==='photo'){npc.t++;if(npc.t>40)npc.t=0;}
    else if(npc.state!=='photo')npc.t=0;
  }
  npc.x=Math.max(0,Math.min(BGW-NPCW,npc.x));
  npc.y=groundAt(npc.x+NPCW/2)-NPCH;
}
function npcFrame(){
  if(npc.state==='walkin'||npc.state==='walk'||npc.state==='trail') return Math.floor(npc.anim)%6;
  if(npc.state==='photo'){
    const p=npc.t/40;
    return p<0.3?6:p<0.6?7:8;
  }
  return 9;
}
function drawNPC(camX){
  if(!npc.active)return;
  if(!imgOk(loaded.photog))return;
  const sx=(npc.x-camX)*ZOOM,sy=(npc.y-SRCY)*ZOOM;
  if(sx<-NPCW*ZOOM*2||sx>VW+NPCW*ZOOM)return;
  const dw=NPCW*ZOOM,dh=NPCH*ZOOM;
  if(npc.state==='photo'&&npc.t>12&&npc.t<22){
    ctx.save();ctx.globalAlpha=0.5*(1-Math.abs(npc.t-17)/5);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx+(npc.x>player.x?dw*0.08:dw*0.92),sy+dh*0.3,18,0,7);ctx.fill();ctx.restore();
  }
  const facingLeft=npc.x>player.x;
  ctx.save();
  if(facingLeft){ctx.translate(sx+dw,sy);ctx.scale(-1,1);}
  else{ctx.translate(sx,sy);}
  try{ ctx.drawImage(loaded.photog,npcFrame()*PFW,0,PFW,PFH,0,0,dw,dh); }catch(e){}
  ctx.restore();
}

// ── INPUT ──
addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
  if((e.key===' '||e.key==='ArrowUp'||e.key==='w')&&!csActive){keys.jump=true;e.preventDefault();}
  if((e.key==='x'||e.key==='f')&&!punchDown){punchDown=true;punchEdge=true;}
  if(e.key==='Escape'&&csActive){clearTimeout(csTimeout);endCutscene();}
  if((e.key==='p'||e.key==='P')&&cur&&!csActive)setPaused(!paused);
});
addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w')keys.jump=false;
  if(e.key==='x'||e.key==='f')punchDown=false;
});
document.querySelectorAll('.btn').forEach(b=>{
  const k=b.dataset.k;
  const on=e=>{e.preventDefault();if(k==='punch'){if(!punchDown){punchDown=true;punchEdge=true;}}else keys[k]=true;};
  const off=e=>{e.preventDefault();if(k==='punch')punchDown=false;else keys[k]=false;};
  b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off,{passive:false});
  b.addEventListener('touchcancel',off,{passive:false});
  b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);b.addEventListener('mouseleave',off);
});

// ── LOOP ──
function goFullscreen(){
  const el=document.documentElement;
  const rq=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(rq){ try{ rq.call(el); }catch(e){} }
  if(screen.orientation&&screen.orientation.lock){ try{ screen.orientation.lock('landscape').catch(()=>{}); }catch(e){} }
}
function start(m){
  cur=m;
  FW=m.fw; FH=m.fh; PW=Math.round(PH*FW/FH); CLIPS=m.clips;
  goFullscreen();
  document.getElementById('select').style.display='none';
  document.getElementById('kbhint').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('who').firstChild.textContent=m.name+' ';
  document.getElementById('flag').textContent=m.flag;
  player.x=120;player.y=groundAt(120+PW/2)-PH;player.vx=0;player.vy=0;
  player.face=1;player.onGround=true;player.clip='idle';player.ct=0;runHold=0;
  bannerShown=false;csActive=false;csDone=false;
  setPaused(false);
  initNPC();
  const bgm=document.getElementById('bgm');
  bgm.currentTime=0;bgm.volume=0.15;bgm.play().catch(()=>{});
  if(!raf)loop();
}

let paused=false;
function setPaused(p){
  paused=p;
  document.getElementById('pausemenu').classList.toggle('on',p);
  document.getElementById('pause').innerHTML=p?'&#9654;':'&#10073;&#10073;';
  const bgm=document.getElementById('bgm');
  if(p){ bgm.pause(); } else if(cur){ bgm.play().catch(()=>{}); }
}
document.getElementById('pause').onclick=(e)=>{ e.stopPropagation(); setPaused(!paused); };
document.getElementById('pausemenu').onclick=()=>setPaused(false);

function update(){
  if(csActive)return;

  // ── attack input: punch, chain into headbutt on a second press ──
  if(punchEdge){
    punchEdge=false;
    if(player.onGround){
      if(!playerAttacking()) setClip('punch');
      else if(player.clip==='punch') setClip('headbutt');
    }
  }
  const attacking=playerAttacking() && !clipDone();

  // ── horizontal movement (locked while attacking on the ground) ──
  let moving=false;
  if(!attacking){
    if(keys.left&&!keys.right){player.face=-1;moving=true;}
    else if(keys.right&&!keys.left){player.face=1;moving=true;}
  }
  runHold = moving ? Math.min(runHold+1,60) : 0;
  const running = moving && runHold>28;
  player.vx = attacking ? 0 : (moving ? player.face*(running?RUNSPEED:SPEED) : 0);

  // ── jump ──
  if(keys.jump&&player.onGround&&!attacking){player.vy=JUMP;player.onGround=false;}

  // ── physics ──
  player.vy+=GRAV;player.x+=player.vx;player.y+=player.vy;
  player.x=Math.max(0,Math.min(BGW-PW,player.x));
  const g=groundAt(player.x+PW/2);
  if(player.y+PH>=g){player.y=g-PH;player.vy=0;player.onGround=true;}

  // ── advance animation, then resolve which clip should play ──
  player.ct++;
  const stillAttacking = playerAttacking() && !clipDone();
  if(!stillAttacking){
    if(!player.onGround) setClip('jump');
    else if(moving) setClip(running?'run':'walk');
    else setClip('idle');
  }

  updateNPC();
  const ban=document.getElementById('banner');
  if(player.x>BGW-PW-40){if(!bannerShown){ban.style.opacity=1;bannerShown=true;}}
  else if(bannerShown){ban.style.opacity=0;bannerShown=false;}
}
function frameIndex(){
  const c=CLIPS[player.clip];
  let f=Math.floor(player.ct*c.fps/60);
  f = c.loop ? (f%c.count) : Math.min(f,c.count-1);
  return c.start+f;
}
function draw(){
  let camX=player.x+PW/2-SRCW/2;
  camX=Math.max(0,Math.min(BGW-SRCW,camX));
  ctx.clearRect(0,0,VW,VH);
  ctx.imageSmoothingEnabled=true;
  if(imgOk(loaded.bg)){
    try{ ctx.drawImage(loaded.bg,camX,SRCY,SRCW,SRCH,0,0,VW,VH); }catch(e){ drawNoBg(); }
  }else{ drawNoBg(); }
  drawNPC(camX);
  const fx=frameIndex();
  const bob=0;
  const sx=(player.x-camX)*ZOOM,sy=(player.y+bob-SRCY)*ZOOM;
  const dw=PW*ZOOM,dh=PH*ZOOM;
  if(imgOk(loaded[cur.id])){
    ctx.save();
    if(player.face<0){ctx.translate(sx+dw,sy);ctx.scale(-1,1);}
    else{ctx.translate(sx,sy);}
    // Soft rim so the dark character separates from the dark background.
    ctx.shadowColor='rgba(150,180,255,0.55)';
    ctx.shadowBlur=7;
    try{ ctx.drawImage(loaded[cur.id],fx*FW,0,FW,FH,0,0,dw,dh); }catch(e){}
    ctx.restore();
  }else{
    // visible stand-in so you can still test movement without the sprite
    ctx.fillStyle='#c0392b';
    ctx.fillRect(sx,sy,dw,dh);
  }
}
function drawNoBg(){
  ctx.fillStyle='#0c0d10'; ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle='#3a3d44'; ctx.fillRect(0,VH*0.78,VW,VH); // crude ground
  ctx.fillStyle='#666'; ctx.font='700 14px monospace'; ctx.textAlign='center';
  ctx.fillText('bg.jpg not loaded', VW/2, 40);
  ctx.textAlign='start';
}
function loop(){ if(!paused) update(); draw(); raf=requestAnimationFrame(loop); }
</script>
</body>
</html>
